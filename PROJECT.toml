name = "z3dk"
description = "Zelda 3 Development Kit - Hard fork of Asar with structured output, LSP, and IDE integration"
aliases = ["zAsar", "z3asm", "z3lsp", "z3disasm"]
tags = ["tools", "romhacking", "snes", "assembler", "lsp", "active"]
platforms = ["mac", "linux", "windows"]
stage = "beta"
is_product = false
public = true
commercial_intent = "none"

languages = ["cpp", "python"]
build_system = "cmake"

[links]
github = "https://github.com/scawful/zAsar"

[build]
command = "cmake -B build && cmake --build build -j8"

[test]
command = "./run_tests.sh"

[sync]
type = "git"
direction = "both"
remote = "server"
